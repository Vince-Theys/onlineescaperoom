# Supabase local development configuration.
# Used by `supabase start` — mirrors the settings configured in the hosted project dashboard.
# SMTP credentials (Resend API key) are NEVER stored here; they live in the Supabase dashboard
# under Authentication → Settings → SMTP Settings.

[auth]
enabled = true
site_url = "http://localhost:5173"
additional_redirect_urls = [
  "http://localhost:5173/accept-invite",
  "http://localhost:5173/reset-password",
]

[auth.email]
enable_signup = false         # invite-only — teachers are created by an admin via the invite flow
enable_confirmations = false  # invite links skip the separate email-confirm step
double_confirm_changes = true # require re-confirmation when an account email address changes

[auth.email.template.invite]
subject = "Je bent uitgenodigd — TWA Escape Room"
content_path = "./supabase/templates/invite.html"

[auth.email.template.recovery]
subject = "Herstel je toegang — TWA Escape Room"
content_path = "./supabase/templates/recovery.html"
